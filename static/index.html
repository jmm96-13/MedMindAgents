<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Triaje Médico — Chatbot</title>
  <style>
    :root { --azul: #2563eb; --gris: #f1f5f9; --borde: #e2e8f0; }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      margin: 0; background: #fafafa; color: #1e293b;
      display: flex; justify-content: center;
    }
    main { width: 100%; max-width: 760px; padding: 1rem; }
    h1 { font-size: 1.25rem; margin: 0.5rem 0; }
    .sub { color: #64748b; font-size: 0.85rem; margin-bottom: 1rem; }
    #chat {
      border: 1px solid var(--borde); border-radius: 12px; background: #fff;
      height: 60vh; overflow-y: auto; padding: 1rem; margin-bottom: 0.75rem;
    }
    .msg { margin-bottom: 0.9rem; display: flex; flex-direction: column; }
    .msg .burbuja {
      padding: 0.6rem 0.8rem; border-radius: 12px; max-width: 85%;
      white-space: pre-wrap; line-height: 1.4;
    }
    .user { align-items: flex-end; }
    .user .burbuja { background: var(--azul); color: #fff; }
    .bot { align-items: flex-start; }
    .bot .burbuja { background: var(--gris); }
    .meta { font-size: 0.72rem; color: #64748b; margin-top: 0.2rem; }
    .nivel1 { color: #059669; } .nivel2 { color: #b45309; }
    .fila { display: flex; gap: 0.5rem; }
    input[type=text] {
      flex: 1; padding: 0.65rem 0.8rem; border: 1px solid var(--borde);
      border-radius: 10px; font-size: 1rem;
    }
    button {
      border: none; border-radius: 10px; padding: 0.65rem 0.9rem;
      font-size: 0.9rem; cursor: pointer;
    }
    .enviar { background: var(--azul); color: #fff; }
    .acciones { display: flex; gap: 0.5rem; margin-top: 0.6rem; }
    .ok { background: #dcfce7; color: #166534; }
    .no { background: #fee2e2; color: #991b1b; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <main>
    <h1>Triaje Médico</h1>
  
    <div id="chat"></div>
    <div class="fila">
      <input type="text" id="entrada" placeholder="Introduce tus síntomas" autofocus />
      <button class="enviar" id="btnEnviar">Enviar</button>
    </div>
    <div class="acciones">
      <button class="ok" id="btnSatisfecho">👍 Satisfecho — finalizar</button>
    </div>
  </main>

  <script>
    let sessionId = null;
    let pendienteInsatisfaccion = false;
    let finalizada = false;

    const chat = document.getElementById("chat");
    const entrada = document.getElementById("entrada");
    const btnEnviar = document.getElementById("btnEnviar");
    const btnSatisfecho = document.getElementById("btnSatisfecho");

    function añadirMensaje(texto, clase, meta) {
      const div = document.createElement("div");
      div.className = "msg " + clase;
      const burbuja = document.createElement("div");
      burbuja.className = "burbuja";
      burbuja.textContent = texto;
      div.appendChild(burbuja);
      if (meta) {
        const m = document.createElement("div");
        m.className = "meta " + (meta.nivel === 2 ? "nivel2" : "nivel1");
        m.textContent = meta.texto;
        div.appendChild(m);
      }
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function enviar() {
      const mensaje = entrada.value.trim();
      if (!mensaje || finalizada) return;
      añadirMensaje(mensaje, "user");
      entrada.value = "";
      btnEnviar.disabled = true;

      const body = { mensaje, session_id: sessionId };
      if (pendienteInsatisfaccion) {
        body.feedback = "insatisfecho";
        pendienteInsatisfaccion = false;
      }

      try {
        const r = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.detail || "Error");
        sessionId = data.session_id;
        let etiqueta;
        if (data.nivel === 2) {
          etiqueta = "Nivel 2 · Experto" + (data.escalado ? ` (escalado: ${data.motivo})` : "");
        } else if (data.nivel === 0) {
          etiqueta = "Recepción";
        } else {
          etiqueta = "Nivel 1 · FAQ";
        }
        añadirMensaje(data.respuesta, "bot", { nivel: data.nivel, texto: etiqueta });
      } catch (e) {
        añadirMensaje("⚠️ " + e.message, "bot", { nivel: 1, texto: "error" });
      } finally {
        btnEnviar.disabled = false;
        entrada.focus();
      }
    }

    async function finalizar() {
      if (!sessionId || finalizada) return;
      const r = await fetch(`/session/${sessionId}/finalizar`, { method: "POST" });
      const data = await r.json();
      añadirMensaje(`${data.mensaje} (${data.turnos} turnos)`, "bot", { nivel: 1, texto: "sistema" });
      finalizada = true;
      entrada.disabled = true;
      btnEnviar.disabled = true;
    }

    btnEnviar.addEventListener("click", enviar);
    entrada.addEventListener("keydown", (e) => { if (e.key === "Enter") enviar(); });
    btnSatisfecho.addEventListener("click", finalizar);

  </script>
</body>
</html>
