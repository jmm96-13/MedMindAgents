<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Triaje Médico — Chatbot</title>
  <style>
    :root { --azul: #2563eb; --gris: #f1f5f9; --borde: #e2e8f0; }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      margin: 0; background: #fafafa; color: #1e293b;
      display: flex; justify-content: center;
    }
    main { width: 100%; max-width: 760px; padding: 1rem; }
    h1 { font-size: 1.25rem; margin: 0.5rem 0; }
    .sub { color: #64748b; font-size: 0.85rem; margin-bottom: 1rem; }
    #chat {
      border: 1px solid var(--borde); border-radius: 12px; background: #fff;
      height: 60vh; overflow-y: auto; padding: 1rem; margin-bottom: 0.75rem;
    }
    .msg { margin-bottom: 0.9rem; display: flex; flex-direction: column; }
    .msg .burbuja {
      padding: 0.6rem 0.8rem; border-radius: 12px; max-width: 85%;
      white-space: pre-wrap; line-height: 1.4;
    }
    .user { align-items: flex-end; }
    .user .burbuja { background: var(--azul); color: #fff; }
    .bot { align-items: flex-start; }
    .bot .burbuja { background: var(--gris); }
    .meta { font-size: 0.72rem; color: #64748b; margin-top: 0.2rem; }
    .fila { display: flex; gap: 0.5rem; }
    input[type=text] {
      flex: 1; padding: 0.65rem 0.8rem; border: 1px solid var(--borde);
      border-radius: 10px; font-size: 1rem;
    }
    button {
      border: none; border-radius: 10px; padding: 0.65rem 0.9rem;
      font-size: 0.9rem; cursor: pointer; transition: opacity 0.2s;
    }
    .enviar { background: var(--azul); color: #fff; }
    .enviar.cargando { position: relative; }
    .enviar.cargando::after {
      content: '';
      display: inline-block;
      width: 14px; height: 14px; margin-left: 0.4rem;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .acciones { display: flex; gap: 0.5rem; margin-top: 0.6rem; }
    .ok { background: #dcfce7; color: #166534; }
    .no { background: #fee2e2; color: #991b1b; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <main>
    <h1>Triaje Médico</h1>
  
    <div id="chat"></div>
    <div class="fila">
      <input type="text" id="entrada" placeholder="Introduce tus síntomas" autofocus />
      <button class="enviar" id="btnEnviar">Enviar</button>
    </div>
    <div class="acciones">
      <button class="ok" id="btnFinish">👍 Satisfecho — finalizar</button>
    </div>
  </main>

  <script>
    let sessionId = null;
    let finalizada = false;

    const chat = document.getElementById("chat");
    const entrada = document.getElementById("entrada");
    const btnEnviar = document.getElementById("btnEnviar");
    const btnFinish = document.getElementById("btnFinish");

    function añadirMensaje(texto, clase) {
      const div = document.createElement("div");
      div.className = "msg " + clase;
      const burbuja = document.createElement("div");
      burbuja.className = "burbuja";
      burbuja.textContent = texto;
      div.appendChild(burbuja);
      if (clase === "bot") {
        const m = document.createElement("div");
        m.className = "meta";
        m.textContent = "Respuesta del bot";
        div.appendChild(m);
      }
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    // No permitir finalizar hasta tener sesión
    btnFinish.disabled = true;

    async function enviar() {
      const mensaje = entrada.value.trim();
      if (!mensaje || finalizada) return;
      añadirMensaje(mensaje, "user");
      entrada.value = "";
      entrada.disabled = true;
      btnEnviar.disabled = true;
      btnEnviar.classList.add("cargando");
      btnEnviar.textContent = "Enviando";

      const body = { mensaje, session_id: sessionId };

      try {
        const r = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        
        let data;
        try {
          data = await r.json();
        } catch (e) {
          throw new Error('Error parsing server response');
        }
        
        if (!r.ok) {
          throw new Error(data?.detail || data?.message || "Error del servidor");
        }
        
        sessionId = data.session_id;
        // Habilitar botón de finalizar una vez creada la sesión
        if (sessionId) btnFinish.disabled = false;
        añadirMensaje(data.respuesta, "bot");
      } catch (e) {
        añadirMensaje("⚠️ " + e.message, "bot");
      } finally {
        entrada.disabled = false;
        btnEnviar.disabled = false;
        btnEnviar.classList.remove("cargando");
        btnEnviar.textContent = "Enviar";
        entrada.focus();
      }
    }

    async function finalizar() {
      if (!sessionId || finalizada) return;
      try {
        const r = await fetch(`/session/${sessionId}/finalizar`, { method: "POST" });
        if (!r.ok) throw new Error("Error al finalizar sesión");
        const data = await r.json();
        añadirMensaje(data.mensaje, "bot");
        finalizada = true;
        entrada.disabled = true;
        btnEnviar.disabled = true;
        btnFinish.disabled = true;
        btnFinish.textContent = "✓ Sesión cerrada";
      } catch (e) {
        añadirMensaje("⚠️ Error al finalizar: " + e.message, "bot");
      }
    }

    btnEnviar.addEventListener("click", enviar);
    entrada.addEventListener("keydown", (e) => { if (e.key === "Enter") enviar(); });
    btnFinish.addEventListener("click", finalizar);

  </script>
</body>
</html>
